<style>
  :root {
    --teal: #0EB0A4;
    --teal-light: #14d4c6;
    --teal-dark: #0a8a80;
    --bg-primary: #090E12;
    --bg-secondary: #0f1920;
    --bg-card: #131C24;
    --bg-card-hover: #1a2633;
    --text-primary: #ffffff;
    --text-secondary: #a0aeb8;
    --text-muted: #6b7a86;
    --gradient-teal: linear-gradient(135deg, #0EB0A4 0%, #0a8a80 100%);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* --- NAV --- */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 40px;
    display: flex; align-items: center;
    background: rgba(9, 14, 18, 0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .nav-logo { height: 24px; width: auto; }

  /* --- HERO --- */
  .hero {
    margin-top: 68px;
    padding: 80px 40px 60px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(14, 176, 164, 0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 20px;
    position: relative;
  }
  .hero h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(28px, 4.5vw, 52px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -2px;
    white-space: nowrap;
    margin: 0 auto 16px;
    position: relative;
  }
  .hero-dynamic {
    color: var(--teal);
    display: inline;
    transition: opacity 0.35s ease;
  }
  .hero-sub {
    font-size: clamp(15px, 1.4vw, 18px);
    color: var(--text-secondary);
    max-width: 560px;
    margin: 0 auto;
    position: relative;
    line-height: 1.6;
  }

  /* --- VERTICALS --- */
  .verticals-section {
    padding: 32px 40px 40px;
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .verticals-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
  }
  .verticals-grid {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center;
    max-width: 1000px; margin: 0 auto;
  }
  .v-pill {
    padding: 10px 20px;
    border-radius: 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    color: var(--text-secondary);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }
  .v-pill::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 24px;
  }
  .v-pill:hover {
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .v-pill.active {
    color: #fff;
    font-weight: 600;
    border-color: transparent;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .v-pill .v-count {
    margin-left: 6px;
    font-size: 12px;
    opacity: 0.6;
  }


  /* --- SPOTLIGHT SECTION --- */
  .spotlight-section {
    padding: 0 40px 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .spotlight-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--teal);
    margin-bottom: 20px;
    opacity: 0.8;
  }
  .spotlight-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .spotlight-card {
    background: linear-gradient(135deg, rgba(14,176,164,0.08) 0%, var(--bg-card) 60%);
    border: 1px solid rgba(14, 176, 164, 0.2);
    border-radius: 18px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: all 0.3s ease;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
  }
  .spotlight-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gradient-teal);
  }
  .spotlight-card:hover {
    border-color: var(--teal);
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(14, 176, 164, 0.15);
  }
  .spotlight-top {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .spotlight-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--gradient-teal);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 700;
    color: #fff; flex-shrink: 0; text-transform: uppercase; overflow: hidden;
    border: 2px solid rgba(14, 176, 164, 0.3);
  }
  .spotlight-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .spotlight-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px; font-weight: 700; color: var(--text-primary);
  }
  .spotlight-title {
    font-size: 14px; color: var(--text-secondary); margin-top: 2px;
  }
  .spotlight-location {
    font-size: 12px; color: var(--teal); margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .spotlight-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: rgba(14, 176, 164, 0.15);
    color: var(--teal);
    border: 1px solid rgba(14, 176, 164, 0.25);
    margin-top: 4px;
  }
  .spotlight-welcome {
    font-size: 13px; color: var(--text-secondary);
    font-style: italic;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  /* --- MEMBER GRID --- */
  .member-grid {
    padding: 40px 40px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .member-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: all 0.3s ease;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    position: relative;
  }
  .member-card.card-featured {
    grid-column: span 1;
    padding: 28px;
    border-color: rgba(255,255,255,0.1);
  }
  .member-card:hover {
    border-color: rgba(14, 176, 164, 0.3);
    background: var(--bg-card-hover);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  .member-card .hover-reveal {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .member-card:hover .hover-reveal {
    max-height: 60px;
    opacity: 1;
  }
  .hover-location {
    font-size: 12px; color: var(--teal);
    margin-top: 6px;
    display: flex; align-items: center; gap: 4px;
  }
  .hover-profile-link {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    transition: color 0.2s;
  }
  .member-card:hover .hover-profile-link {
    color: var(--teal);
  }
  .avatar {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--gradient-teal);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700;
    color: #fff; flex-shrink: 0; text-transform: uppercase; overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .member-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .member-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .member-title {
    font-size: 13px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  .member-vertical {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(14, 176, 164, 0.12);
    color: var(--teal);
    border: 1px solid rgba(14, 176, 164, 0.2);
    margin-top: 8px;
    max-width: 100%;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .all-members-label {
    padding: 40px 40px 0;
    max-width: 1400px;
    margin: 0 auto;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
  }

  .empty-state {
    grid-column: 1 / -1; text-align: center; padding: 80px 40px; color: var(--text-muted);
  }
  .empty-state-text { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 500; }

  .footer {
    padding: 32px 40px; text-align: center;
    font-size: 12px; color: var(--text-muted);
    border-top: 1px solid rgba(255,255,255,0.04);
    opacity: 0.5;
  }

  @media (max-width: 768px) {
    nav, .hero, .verticals-section, .results-bar, .member-grid, .footer { padding-left: 20px; padding-right: 20px; }
    .member-grid { grid-template-columns: 1fr; }
    .hero { padding: 60px 20px 40px; }
  }
</style>
</head>

function vLabel(v) { return VERTICAL_LABELS[v] || v || 'Other'; }
function vColor(v) { return VERTICAL_COLORS[v] || '#6b7280'; }

function getInitials(name) {
  if (!name || name === 'Unknown') return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  return parts[0][0].toUpperCase();
}
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

const allVerticals = [...new Set(MEMBERS_DATA.map(m => m.vertical).filter(Boolean))].sort();
let selectedVertical = 'all';

// Animated hero word rotation
const heroWords = ['Novas', 'top talent', 'rising stars', 'leaders', 'changemakers'];
const rotatingEl = document.getElementById('rotatingWord');
let wordIdx = 0;
setInterval(() => {
  rotatingEl.style.opacity = '0';
  setTimeout(() => {
    wordIdx = (wordIdx + 1) % heroWords.length;
    rotatingEl.textContent = heroWords[wordIdx];
    rotatingEl.style.opacity = '1';
  }, 350);
}, 2800);

function renderVerticalPills() {
  const container = document.getElementById('verticalPills');
  container.innerHTML = '';
  const vc = {};
  MEMBERS_DATA.forEach(m => { const v = m.vertical || ''; vc[v] = (vc[v] || 0) + 1; });

  // "All" pill
  const allPill = document.createElement('div');
  allPill.className = 'v-pill' + (selectedVertical === 'all' ? ' active' : '');
  allPill.innerHTML = 'All';
  allPill.style.cssText = selectedVertical === 'all'
    ? 'background: var(--teal); border-color: var(--teal);'
    : '';
  allPill.onmouseenter = () => { if (selectedVertical !== 'all') { allPill.style.borderColor = 'var(--teal)'; allPill.style.background = 'rgba(14,176,164,0.12)'; }};
  allPill.onmouseleave = () => { if (selectedVertical !== 'all') { allPill.style.borderColor = 'rgba(255,255,255,0.08)'; allPill.style.background = 'rgba(255,255,255,0.02)'; }};
  allPill.onclick = () => { selectedVertical = 'all'; render(); };
  container.appendChild(allPill);

  allVerticals.forEach(v => {
    const count = vc[v] || 0;
    const color = vColor(v);
    const pill = document.createElement('div');
    pill.className = 'v-pill' + (selectedVertical === v ? ' active' : '');
    pill.innerHTML = escapeHtml(vLabel(v));

    if (selectedVertical === v) {
      pill.style.cssText = 'background: var(--teal); border-color: var(--teal);';
    }
    pill.onmouseenter = () => {
      if (selectedVertical !== v) {
        pill.style.borderColor = 'var(--teal)';
        pill.style.background = 'rgba(14,176,164,0.12)';
        pill.style.color = 'var(--teal)';
      }
    };
    pill.onmouseleave = () => {
      if (selectedVertical !== v) {
        pill.style.borderColor = 'rgba(255,255,255,0.08)';
        pill.style.background = 'rgba(255,255,255,0.02)';
        pill.style.color = '';
      }
    };
    pill.onclick = () => { selectedVertical = v; render(); };
    container.appendChild(pill);
  });

  if (vc[''] && vc[''] > 0) {
    const pill = document.createElement('div');
    pill.className = 'v-pill' + (selectedVertical === '' ? ' active' : '');
    pill.innerHTML = 'Other';
    if (selectedVertical === '') pill.style.cssText = 'background:#6b7280; border-color:#6b7280;';
    pill.onclick = () => { selectedVertical = ''; render(); };
    container.appendChild(pill);
  }
}

function getFiltered() {
  if (selectedVertical === 'all') return MEMBERS_DATA;
  return MEMBERS_DATA.filter(m => (m.vertical || '') === selectedVertical);
}

// Deterministic spotlight: pick members with photo + title + location, seeded by month data
function pickSpotlights(members, count) {
  const candidates = members.filter(m => m.photo && m.title && m.location);
  if (candidates.length === 0) return members.slice(0, count);
  // Shuffle deterministically based on data length
  const shuffled = candidates.slice().sort((a, b) => {
    const ha = a.name.length * 31 + (a.title || '').length * 17;
    const hb = b.name.length * 31 + (b.title || '').length * 17;
    return ha - hb;
  });
  return shuffled.slice(0, count);
}

const WELCOME_PHRASES = [
  'Thrilled to have you on board!',
  'Welcome to the Nova community!',
  'Great things ahead!',
  'The community just got stronger!',
  'Excited to see your journey!',
];

function makeCardLink(m) {
  const el = m.publicId ? document.createElement('a') : document.createElement('div');
  if (m.publicId) {
    el.href = 'https://app.novatalent.com/members/' + m.publicId;
    el.target = '_blank';
    el.rel = 'noopener noreferrer';
  }
  return el;
}

function renderSpotlights(filtered) {
  const section = document.getElementById('spotlightSection');
  const grid = document.getElementById('spotlightGrid');
  grid.innerHTML = '';
  const spots = pickSpotlights(filtered, 4);
  if (spots.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';

  spots.forEach((m, i) => {
    const card = makeCardLink(m);
    card.className = 'spotlight-card';
    const initials = getInitials(m.name);
    const avatarContent = m.photo
      ? '<img src="' + escapeHtml(m.photo) + '" alt="" onerror="this.parentElement.textContent=\'' + initials + '\'">'
      : initials;
    const locationHtml = m.location
      ? '<div class="spotlight-location"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ' + escapeHtml(m.location) + '</div>'
      : '';
    const verticalHtml = m.vertical
      ? '<div class="spotlight-badge">' + escapeHtml(vLabel(m.vertical)) + '</div>'
      : '';
    card.innerHTML =
      '<div class="spotlight-top">' +
        '<div class="spotlight-avatar">' + avatarContent + '</div>' +
        '<div>' +
          '<div class="spotlight-name">' + escapeHtml(m.name) + '</div>' +
          '<div class="spotlight-title">' + escapeHtml(m.title || '') + '</div>' +
          locationHtml +
        '</div>' +
      '</div>' +
      verticalHtml +
      '<div class="spotlight-welcome">"' + WELCOME_PHRASES[i % WELCOME_PHRASES.length] + '"</div>';
    grid.appendChild(card);
  });
}

function renderGrid(filtered, spotlightIds) {
  const grid = document.getElementById('memberGrid');
  const label = document.getElementById('allMembersLabel');
  grid.innerHTML = '';
  // Exclude spotlight members from main grid
  const rest = filtered.filter(m => !spotlightIds.has(m.name));
  if (rest.length === 0 && filtered.length === 0) {
    label.style.display = 'none';
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-text">No members found</div></div>';
    return;
  }
  label.style.display = '';

  rest.forEach((m, i) => {
    const wrapper = makeCardLink(m);
    // Mixed sizes: every 5th card is featured
    const isFeatured = (i % 7 === 0 || i % 7 === 3) && m.photo && m.title;
    wrapper.className = 'member-card' + (isFeatured ? ' card-featured' : '');
    const initials = getInitials(m.name);
    const avatarContent = m.photo
      ? '<img src="' + escapeHtml(m.photo) + '" alt="" onerror="this.parentElement.textContent=\'' + initials + '\'">'
      : initials;
    const titleHtml = m.title
      ? '<div class="member-title">' + escapeHtml(m.title) + '</div>'
      : '';
    const verticalHtml = m.vertical
      ? '<div class="member-vertical">' + escapeHtml(vLabel(m.vertical)) + '</div>'
      : '';
    // Hover reveal: location + view profile
    let hoverHtml = '<div class="hover-reveal">';
    if (m.location) {
      hoverHtml += '<div class="hover-location"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ' + escapeHtml(m.location) + '</div>';
    }
    if (m.publicId) {
      hoverHtml += '<div class="hover-profile-link">View full profile &#8594;</div>';
    }
    hoverHtml += '</div>';

    wrapper.innerHTML =
      '<div class="avatar">' + avatarContent + '</div>' +
      '<div class="member-info">' +
        '<div class="member-name">' + escapeHtml(m.name) + '</div>' +
        titleHtml +
        verticalHtml +
        hoverHtml +
      '</div>';
    grid.appendChild(wrapper);
  });
}

function render() {
  renderVerticalPills();
  const filtered = getFiltered();
  const spots = pickSpotlights(filtered, 4);
  const spotlightIds = new Set(spots.map(m => m.name));
  renderSpotlights(filtered);
  renderGrid(filtered, spotlightIds);
}

render();
</script>
</body>
</html>
